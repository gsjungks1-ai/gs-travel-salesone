<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행가격 GS샵 변환기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #f5f5f5;
    color: #222;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .container { max-width: 860px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #111; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }

  .card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    padding: 20px 22px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #f0f0f0;
  }
  .section-label {
    font-size: 12px;
    color: #666;
    margin-bottom: 7px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  textarea {
    width: 100%;
    font-family: 'Consolas', 'D2Coding', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 7px;
    background: #fafafa;
    color: #222;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #555; background: #fff; }
  .hint {
    font-size: 12px;
    color: #aaa;
    margin-top: 7px;
    line-height: 1.7;
  }

  /* 형식 감지 표시 */
  .detect-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 7px;
    background: #f8f8f8;
    border: 1px solid #e8e8e8;
    font-size: 13px;
    display: none;
  }
  .detect-row.visible { display: flex; }
  .detect-label { color: #666; flex-shrink: 0; }
  .detect-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-a { background: #e3f0ff; color: #1a5fba; }
  .badge-b { background: #fff0e3; color: #b85a00; }
  .detect-desc { color: #888; font-size: 12px; flex: 1; }
  .toggle-btn {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #fff;
    color: #555;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .toggle-btn:hover { background: #f0f0f0; }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  button.primary {
    padding: 9px 20px;
    border-radius: 7px;
    border: 1px solid #222;
    background: #222;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  button.primary:hover { background: #444; }
  button.secondary {
    padding: 9px 20px;
    border-radius: 7px;
    border: 1px solid #ccc;
    background: #fff;
    color: #333;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  button.secondary:hover { background: #f0f0f0; }

  .alert-list { display: flex; flex-direction: column; gap: 7px; margin-top: 14px; }
  .alert {
    padding: 10px 14px;
    border-radius: 7px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .alert.warn { background: #fff8e1; color: #7a5800; border: 1px solid #ffe082; }
  .alert.info { background: #e8f5e9; color: #2e6b38; border: 1px solid #a5d6a7; }
  .alert.error  { background: #ffebee; color: #b71c1c; border: 1px solid #ef9a9a; }
  .alert.review { background: #fff3e0; color: #7a3d00; border: 2px solid #ffb74d; font-size: 13px; }

  .output-wrap { position: relative; }
  #output {
    font-family: 'Consolas', 'D2Coding', monospace;
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    background: #f8f8f8;
    border: 1px solid #e0e0e0;
    border-radius: 7px;
    padding: 14px 14px 50px;
    min-height: 80px;
    color: #222;
  }
  #output.placeholder { color: #bbb; }
  .copy-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 7px;
    border: 1px solid #ccc;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
  }
  .copy-btn:hover { background: #f0f0f0; }
</style>
</head>
<body>
<div class="container">
  <h1>여행가격 GS샵 변환기</h1>
  <p class="subtitle">여행사 엑셀표 → GS샵 웹 게시 양식 자동 변환 · 중복 날짜 자동 검출</p>

  <div class="card">
    <div class="card-title">엑셀 데이터 붙여넣기</div>

    <div class="section-label">엑셀에서 복사한 내용</div>
    <textarea id="input" rows="12"
      placeholder="여행사 엑셀표를 Ctrl+C 후 여기에 Ctrl+V 하세요.

[형식 A] 첫 행에 상품명(예: 푸꾸옥 3박5일 / 비엣젯항공)이 있는 경우
[형식 B] '출발일' 행으로 바로 시작하는 경우 (성인/아동/유아 자동 처리)"
      oninput="detectFormat()"></textarea>
    <p class="hint">
      붙여넣기 하면 형식을 자동으로 감지합니다. 잘못 감지됐을 경우 직접 변경할 수 있습니다.
    </p>

    <!-- 자동 감지 결과 표시 -->
    <div id="detectRow" class="detect-row">
      <span class="detect-label">감지된 형식</span>
      <span id="detectBadge" class="detect-badge"></span>
      <span id="detectDesc" class="detect-desc"></span>
      <button class="toggle-btn" onclick="toggleFormat()">다른 형식으로 변경</button>
    </div>

    <div class="btn-row">
      <button class="primary" onclick="convert()">변환하기</button>
      <button class="secondary" onclick="clearAll()">초기화</button>
    </div>
    <div id="alertList" class="alert-list"></div>
  </div>

  <div class="card">
    <div class="card-title">GS샵 웹 양식 출력</div>
    <div class="output-wrap">
      <div id="output" class="placeholder">변환 결과가 여기에 표시됩니다.</div>
      <button class="copy-btn" onclick="copyOutput()">복사</button>
    </div>
  </div>
</div>

<script>
/* ── 상태 ── */
let detectedFormat = null; // 'A' | 'B'
let selectedFormat = null; // 'A' | 'B' (수동 변경 시)

/* ── 형식 감지 및 UI 업데이트 ── */
function detectFormat() {
  const raw = document.getElementById('input').value.trim();
  if (!raw) {
    document.getElementById('detectRow').classList.remove('visible');
    detectedFormat = null;
    selectedFormat = null;
    return;
  }
  const lines = normalizeExcelPaste(raw);
  detectedFormat = isFormatB(lines) ? 'B' : 'A';
  if (selectedFormat === null) selectedFormat = detectedFormat;
  updateDetectUI();
}

function updateDetectUI() {
  const row = document.getElementById('detectRow');
  const badge = document.getElementById('detectBadge');
  const desc = document.getElementById('detectDesc');
  row.classList.add('visible');

  const f = selectedFormat;
  badge.textContent = '형식 ' + f;
  badge.className = 'detect-badge ' + (f === 'A' ? 'badge-a' : 'badge-b');

  if (f === 'A') {
    desc.textContent = '상품명+항공사 포함 형식 — 첫 행이 상품명으로 시작';
  } else {
    desc.textContent = '출발일/가격만 있는 형식 — 성인/아동/유아 단서 자동 생성';
  }

  if (selectedFormat !== detectedFormat) {
    desc.textContent += '  ⚠ 자동 감지 결과와 다름 (수동 변경됨)';
  }
}

function toggleFormat() {
  if (selectedFormat === 'A') selectedFormat = 'B';
  else selectedFormat = 'A';
  updateDetectUI();
}

/* ── 엑셀 붙여넣기 정규화 ── */
function normalizeExcelPaste(raw) {
  const result = [];
  let i = 0, currentLine = [], currentCell = '', inQuote = false;
  while (i < raw.length) {
    const ch = raw[i];
    if (inQuote) {
      if (ch === '"') {
        if (raw[i+1] === '"') { currentCell += '"'; i += 2; continue; }
        else { inQuote = false; i++; continue; }
      } else if (ch === '\r') { i++; continue; }
      else { currentCell += ch; i++; continue; }
    } else {
      if (ch === '"') { inQuote = true; i++; continue; }
      else if (ch === '\t') { currentLine.push(currentCell); currentCell = ''; i++; continue; }
      else if (ch === '\r') { i++; continue; }
      else if (ch === '\n') {
        currentLine.push(currentCell);
        result.push(currentLine.join('\t'));
        currentLine = []; currentCell = ''; i++; continue;
      } else { currentCell += ch; i++; continue; }
    }
  }
  if (currentCell || currentLine.length) { currentLine.push(currentCell); result.push(currentLine.join('\t')); }
  return result;
}

/* ── 날짜 파싱 ── */
function hasKoreanComment(str) {
  return /\s*[-–]\s*.*[\uAC00-\uD7A3]/.test(str) || /[\uAC00-\uD7A3]/.test(str.replace(/월|일/g,''));
}

// ✅ 수정: 작은따옴표(') 전체 제거 추가
function parseDatesRaw(cell, flaggedCells) {
  cell = (cell || '').replace(/'/g, '').replace(/^"|"$/g, '').trim();
  if (!cell) return [];
  const allResults = [];

  const cellNoDate = cell.replace(/\d+월|\d+일/g, '');
  const hasComment = /[가-힣]/.test(cellNoDate);
  if (hasComment && flaggedCells) flaggedCells.push(cell);

  cell.split('\n').forEach(line => {
    line = line.trim();
    if (!line) return;

    const korMatch = line.match(/^(\d+)월\s*(\d+)일/);
    if (korMatch) {
      allResults.push({ month: parseInt(korMatch[1]), rawText: korMatch[2] + '일' });
      return;
    }

    let currentMonth = null;
    line.split(',').forEach(part => {
      part = part.trim();
      if (!part) return;
      const slashIdx = part.indexOf('/');
      if (slashIdx !== -1) {
        const m = parseInt(part.substring(0, slashIdx).trim());
        if (!isNaN(m)) {
          currentMonth = m;
          const dayPart = part.substring(slashIdx + 1).trim();
          if (dayPart) allResults.push({ month: m, rawText: dayPart });
        }
      } else if (currentMonth !== null) {
        if (part) allResults.push({ month: currentMonth, rawText: part });
      }
    });
  });

  return allResults;
}

// ✅ 수정: 작은따옴표(') 전체 제거 추가
function parseDatesExpanded(cell) {
  cell = (cell || '').replace(/'/g, '').replace(/^"|"$/g, '').trim();
  if (!cell) return [];
  const allResults = [];

  cell.split('\n').forEach(line => {
    line = line.trim();
    if (!line) return;

    const korMatch = line.match(/^(\d+)월\s*(\d+)일/);
    if (korMatch) {
      allResults.push({ month: parseInt(korMatch[1]), day: parseInt(korMatch[2]) });
      return;
    }

    let currentMonth = null;
    line.split(',').forEach(part => {
      part = part.trim();
      if (!part) return;
      const slashIdx = part.indexOf('/');
      let month = currentMonth;
      let dayPart = part;
      if (slashIdx !== -1) {
        const m = parseInt(part.substring(0, slashIdx).trim());
        if (isNaN(m)) return;
        month = m; currentMonth = m;
        dayPart = part.substring(slashIdx + 1).trim();
      }
      if (month === null) return;
      currentMonth = month;
      const rangeMatch = dayPart.match(/^(\d+)\s*~\s*(\d+)$/);
      if (rangeMatch) {
        const from = parseInt(rangeMatch[1]), to = parseInt(rangeMatch[2]);
        if (!isNaN(from) && !isNaN(to) && from <= to && to - from < 32) {
          for (let d = from; d <= to; d++) allResults.push({ month, day: d });
        }
      } else {
        const day = parseInt(dayPart.replace(/[^0-9]/g, ''));
        if (!isNaN(day) && day > 0) allResults.push({ month, day });
      }
    });
  });

  return allResults;
}

// 출력용: rawDates를 월별로 묶어서 원본 텍스트로 포맷
function formatDateGroup(rawDates) {
  const byMonth = {};
  rawDates.forEach(d => {
    if (!byMonth[d.month]) byMonth[d.month] = [];
    byMonth[d.month].push(d.rawText);
  });
  return Object.keys(byMonth).sort((a,b)=>a-b).map(m =>
    '▶' + m + '/' + byMonth[m].join(', ')
  ).join('\n');
}

// 중복 체크
function dateKey(d) { return d.month + '/' + d.day; }

function checkDups(priceGroups) {
  const dupMap = {};
  priceGroups.forEach((g, gi) => {
    g.expandedDates.forEach(d => {
      const k = dateKey(d);
      if (!dupMap[k]) dupMap[k] = [];
      dupMap[k].push(gi);
    });
  });
  return Object.entries(dupMap).filter(([,idxs])=>idxs.length>1)
    .map(([k,idxs])=>({ date: k, prices: idxs.map(i=>priceGroups[i].price+'원') }));
}

function isNumericPrice(str) {
  return /^\d[\d,]*$/.test(str) && str.replace(/,/g,'').length >= 3;
}

/* ── 출력 블록 생성 ── */
function buildOutput(name, priceGroups, notes, adultChildDiff) {
  let block = name ? '[' + name + ']\n' : '';
  const valid = priceGroups.filter(g => (g.expandedDates || g.dates || []).length > 0);
  let firstDone = false;
  valid.forEach((g, idx) => {
    const suffix = (adultChildDiff && !firstDone) ? ' (성인 기준)' : '';
    block += g.price + '원 출발일' + suffix + '\n';
    firstDone = true;
    block += formatDateGroup(g.dates);
    block += idx < valid.length - 1 ? '\n\n' : '\n';
  });
  if (notes && notes.length > 0) {
    block += '\n' + notes.join('\n');
  }
  return block.trim();
}

/* ── 형식 A 파싱 ── */
function isProductNameLine(line) {
  const first = line.split('\t')[0].replace(/^"|"$/g, '').trim();
  if (!first) return false;
  if (/^[\d,]+$/.test(first)) return false;
  if (/^\d+\//.test(first)) return false;
  if (/^\d+월/.test(first)) return false;
  if (/^출발일/.test(first)) return false;
  if (/^(성인|아동|유아)/.test(first)) return false;
  if (/[가-힣]/.test(first) && first.length >= 4) return true;
  return false;
}

function splitIntoProductsA(lines) {
  const products = [];
  let current = null;
  lines.forEach(line => {
    if (!line.trim()) return;
    if (isProductNameLine(line)) {
      if (current) products.push(current);
      current = { name: line.split('\t')[0].replace(/^"|"$/g,'').trim(), dataLines: [] };
    } else if (current) {
      current.dataLines.push(line);
    }
  });
  if (current) products.push(current);
  return products;
}

function parseProductA(product, flaggedCells) {
  const lines = product.dataLines.filter(l => l.trim());
  if (lines.length < 2) return null;

  const hasDateRow = lines.some(l => /^출발일/.test(l.split('\t')[0].replace(/^"|"$/g,'').trim()));
  if (hasDateRow) {
    const parsed = parseProductBStyle(lines, flaggedCells);
    if (parsed) return { priceGroups: parsed.priceGroups, notes: parsed.notes, adultChildDiff: parsed.adultChildDiff, isBStyle: true };
    return null;
  }

  const priceLine = lines[lines.length - 1];
  const priceTokens = priceLine.split('\t')
    .map(t => t.replace(/^"|"$/g,'').replace(/[^0-9,]/g,'').trim())
    .filter(t => /\d{3}/.test(t));
  const maxCols = priceTokens.length;
  if (maxCols === 0) return null;
  const dateLines = lines.slice(0, lines.length - 1);
  const cols = [];
  for (let i = 0; i < maxCols; i++) cols.push([]);
  dateLines.forEach(line => {
    const tokens = line.split('\t');
    for (let i = 0; i < maxCols; i++) {
      const val = (tokens[i]||'').replace(/^"|"$/g,'').trim();
      if (val) cols[i].push(val);
    }
  });
  return priceTokens.map((price, i) => {
    const raw = cols[i].join('\n');
    return { price, dates: parseDatesRaw(raw, flaggedCells), expandedDates: parseDatesExpanded(raw) };
  });
}

function parseProductBStyle(lines, flaggedCells) {
  const blocks = [];
  let cur = null;
  lines.forEach(line => {
    if (!line.trim()) return;
    const tokens = line.split('\t').map(t => t.replace(/^"|"$/g,'').trim());
    const first = tokens[0];
    const rest = tokens.slice(1);
    if (/^출발일/.test(first)) {
      if (cur) blocks.push(cur);
      cur = { dateCells: rest, adultTokens: null, childTokens: null, hasInfant: false };
    } else if (cur && /성인/.test(first)) {
      cur.adultTokens = rest.map(t => t.replace(/[^0-9,]/g,'').trim());
    } else if (cur && /아동/.test(first)) {
      cur.childTokens = rest.map(t => t.replace(/[^0-9,]/g,'').trim());
    } else if (cur && /유아/.test(first)) {
      cur.hasInfant = true;
    }
  });
  if (cur) blocks.push(cur);
  if (blocks.length === 0) return null;

  const allPriceGroups = [];
  let anyChildDiff = false, anyChild = false, anyInfant = false;
  blocks.forEach(block => {
    if (!block.dateCells || !block.adultTokens) return;
    const maxCols = Math.min(block.dateCells.length, block.adultTokens.length);
    for (let i = 0; i < maxCols; i++) {
      const price = block.adultTokens[i];
      if (!isNumericPrice(price)) continue;
      const raw = block.dateCells[i];
      const dates = parseDatesRaw(raw, flaggedCells);
      const expandedDates = parseDatesExpanded(raw);
      if (expandedDates.length > 0) allPriceGroups.push({ price, dates, expandedDates });
    }
    if (block.childTokens) {
      anyChild = true;
      const pairs = block.adultTokens.map((a, i) => ({ a, c: (block.childTokens||[])[i] || '' }))
        .filter(p => isNumericPrice(p.a) && isNumericPrice(p.c));
      if (pairs.some(p => p.a !== p.c)) anyChildDiff = true;
    }
    if (block.hasInfant) anyInfant = true;
  });

  if (allPriceGroups.length === 0) return null;
  const notes = [];
  if (anyChild) notes.push(anyChildDiff ? '*성인/아동 상이' : '*성인/아동 동일');
  if (anyInfant) notes.push('*유아요금 : 해피콜시 문의');
  return { priceGroups: allPriceGroups, notes, adultChildDiff: anyChildDiff };
}

/* ── 형식 B 감지 및 파싱 ── */
function isFormatB(lines) {
  for (let i = 0; i < lines.length; i++) {
    const first = lines[i].split('\t')[0].replace(/^"|"$/g,'').trim();
    if (first) return /^출발일/.test(first);
  }
  return false;
}

function parseFormatB(lines, flaggedCells) {
  const blocks = [];
  let cur = null;

  lines.forEach(line => {
    if (!line.trim()) return;
    const tokens = line.split('\t').map(t => t.replace(/^"|"$/g,'').trim());
    const first = tokens[0];
    const rest = tokens.slice(1);

    if (/^출발일/.test(first)) {
      if (cur) blocks.push(cur);
      cur = { dateCells: rest, adultTokens: null, childTokens: null, hasInfant: false };
    } else if (cur && /성인/.test(first)) {
      cur.adultTokens = rest.map(t => t.replace(/[^0-9,]/g,'').trim());
    } else if (cur && /아동/.test(first)) {
      cur.childTokens = rest.map(t => t.replace(/[^0-9,]/g,'').trim());
    } else if (cur && /유아/.test(first)) {
      cur.hasInfant = true;
    }
  });
  if (cur) blocks.push(cur);

  if (blocks.length === 0) return null;

  const allPriceGroups = [];
  let anyChildDiff = false;
  let anyChild = false;
  let anyInfant = false;

  blocks.forEach(block => {
    if (!block.dateCells || !block.adultTokens) return;
    const maxCols = Math.min(block.dateCells.length, block.adultTokens.length);
    for (let i = 0; i < maxCols; i++) {
      const price = block.adultTokens[i];
      if (!isNumericPrice(price)) continue;
      const raw = block.dateCells[i];
      const dates = parseDatesRaw(raw, flaggedCells);
      const expandedDates = parseDatesExpanded(raw);
      if (expandedDates.length > 0) allPriceGroups.push({ price, dates, expandedDates });
    }
    if (block.childTokens) {
      anyChild = true;
      const pairs = block.adultTokens.map((a, i) => ({ a, c: (block.childTokens||[])[i] || '' }))
        .filter(p => isNumericPrice(p.a) && isNumericPrice(p.c));
      if (pairs.some(p => p.a !== p.c)) anyChildDiff = true;
    }
    if (block.hasInfant) anyInfant = true;
  });

  if (allPriceGroups.length === 0) return null;

  const notes = [];
  if (anyChild) notes.push(anyChildDiff ? '*성인/아동 상이' : '*성인/아동 동일');
  if (anyInfant) notes.push('*유아요금 : 해피콜시 문의');

  return { priceGroups: allPriceGroups, notes, adultChildDiff: anyChildDiff };
}

/* ── 메인 변환 ── */
function convert() {
  const raw = document.getElementById('input').value;
  if (!raw.trim()) { alert('내용을 붙여넣기 해주세요.'); return; }
  if (!selectedFormat) { alert('내용을 붙여넣기하면 형식이 자동으로 감지됩니다.'); return; }

  const lines = normalizeExcelPaste(raw);
  const alertList = document.getElementById('alertList');
  alertList.innerHTML = '';
  let fullResult = '';
  const flaggedCells = [];

  function showFlaggedWarning() {
    if (flaggedCells.length === 0) return;
    const uniqueCells = [...new Set(flaggedCells)];
    const div = document.createElement('div');
    div.className = 'alert review';
    div.textContent = '⚠ 확인 필요 — 아래 날짜 셀에 일반적이지 않은 내용(메모/주석)이 포함되어 있습니다. 직접 확인 후 필요시 수정해주세요:\n\n' + uniqueCells.map(c => '• ' + c.replace(/\n/g,' / ')).join('\n');
    alertList.insertBefore(div, alertList.firstChild);
  }

  if (selectedFormat === 'B') {
    const parsed = parseFormatB(lines, flaggedCells);
    if (!parsed || parsed.priceGroups.length === 0) {
      showAlert('error', '형식 B로 파싱할 수 없습니다. 혹시 형식 A인지 확인해보세요. ("다른 형식으로 변경" 버튼 클릭)');
      return;
    }
    const { priceGroups, notes, adultChildDiff } = parsed;
    const dups = checkDups(priceGroups);
    if (dups.length > 0) {
      showAlert('warn', '⚠ 중복 날짜:\n' + dups.map(d => d.date + ' (' + d.prices.join(' / ') + ')').join('\n'));
    } else {
      showAlert('info', '✓ 중복 날짜 없음');
    }
    fullResult = buildOutput('', priceGroups, notes, adultChildDiff);

  } else {
    const products = splitIntoProductsA(lines);
    if (products.length === 0) {
      showAlert('error', '형식 A로 파싱할 수 없습니다. 혹시 형식 B인지 확인해보세요. ("다른 형식으로 변경" 버튼 클릭)');
      return;
    }
    products.forEach(product => {
      const parsed = parseProductA(product, flaggedCells);
      if (!parsed) return;

      const priceGroups = parsed.isBStyle ? parsed.priceGroups : parsed;
      const notes = parsed.isBStyle ? parsed.notes : [];
      const adultChildDiff = parsed.isBStyle ? parsed.adultChildDiff : false;

      const dups = checkDups(priceGroups);
      if (dups.length > 0) {
        showAlert('warn', '⚠ [' + product.name + '] 중복 날짜:\n' + dups.map(d => d.date + ' (' + d.prices.join(' / ') + ')').join('\n'));
      } else {
        showAlert('info', '✓ [' + product.name + '] 중복 날짜 없음');
      }
      fullResult += (fullResult ? '\n\n' : '') + buildOutput(product.name, priceGroups, notes, adultChildDiff);
    });
  }

  showFlaggedWarning();

  const outputEl = document.getElementById('output');
  outputEl.classList.remove('placeholder');
  outputEl.textContent = fullResult || '변환된 내용이 없습니다.';
}

function showAlert(type, msg) {
  const div = document.createElement('div');
  div.className = 'alert ' + type;
  div.textContent = msg;
  document.getElementById('alertList').appendChild(div);
}

/* ── 복사 / 초기화 ── */
function copyOutput() {
  const el = document.getElementById('output');
  if (el.classList.contains('placeholder')) return;
  const text = el.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showCopied);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showCopied();
  }
}
function showCopied() {
  const btn = document.querySelector('.copy-btn');
  btn.textContent = '완료!';
  setTimeout(() => btn.textContent = '복사', 1500);
}
function clearAll() {
  document.getElementById('input').value = '';
  const el = document.getElementById('output');
  el.textContent = '변환 결과가 여기에 표시됩니다.';
  el.classList.add('placeholder');
  document.getElementById('alertList').innerHTML = '';
  document.getElementById('detectRow').classList.remove('visible');
  detectedFormat = null;
  selectedFormat = null;
}
</script>
</body>
</html>
